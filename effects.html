<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roll20 Simple Chat Effects Generator</title>
<style>
:root{--page:#18191c;--panel:#24262b;--panel2:#2e3035;--line:#45484f;--text:#f2f3f5;--muted:#a9adb5;--ui:#7aa7ff}
*{box-sizing:border-box}
body{margin:0;padding:18px;background:var(--page);color:var(--text);font:13px/1.5 Arial,"Noto Sans JP","Noto Sans KR",sans-serif}
button,input,select,textarea{font:inherit}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:16px}
.top-side,.toolbar,.savebar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}h1{font-size:21px;margin:0 0 5px}.subtitle,.hint,.status{color:var(--muted)}
.language-control{display:flex;align-items:center;gap:7px;white-space:nowrap}.language-control label{font-size:11px;color:var(--muted)}
.back-link{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;border:1px solid #50535b;border-radius:6px;background:#303238;color:var(--text);padding:6px 9px;text-decoration:none;font-size:12px}.back-link:hover{background:#41444b}
.main{display:grid;grid-template-columns:minmax(530px,1.18fr) minmax(360px,.82fr);gap:16px;align-items:start}.panel{background:var(--panel);border:1px solid #393c42;border-radius:11px;padding:14px}
.section{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:12px}.section:last-child{margin-bottom:0}h2{font-size:14px;margin:0 0 10px}
.field{min-width:0}.field>label{display:block;font-size:11px;color:#d8dbe1;margin-bottom:4px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
input[type=text],select,textarea{width:100%;border:1px solid #50535b;border-radius:6px;background:#1d1e21;color:var(--text);padding:8px 9px;outline:none}
textarea{resize:vertical;min-height:70px;line-height:1.5}input[type=color]{width:100%;height:35px;padding:3px;border:1px solid #50535b;border-radius:6px;background:#1d1e21}input[type=range]{width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--ui)}.check{display:flex;gap:7px;align-items:center;font-size:12px}.check input{margin:0}
.btn{border:1px solid #50535b;border-radius:6px;background:#3b3e45;color:var(--text);padding:7px 10px;cursor:pointer}.btn:hover{background:#484c54}.btn.primary{background:#315b9f;border-color:#4f7fca}.btn.danger{background:#552a2d;border-color:#78363c}.btn.small{padding:4px 7px;font-size:11px}
.quick-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px}.effect-item{border:1px solid #4b4e55;border-radius:8px;background:#282a2f;padding:10px;margin-top:9px}
.effect-head{display:flex;align-items:center;gap:7px;flex-wrap:wrap}.effect-index{font-weight:bold;margin-right:auto}.effect-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:8px}.effect-wide{grid-column:1/-1}
.range-line{display:grid;grid-template-columns:1fr 48px;gap:7px;align-items:center}.range-value{font-size:11px;color:var(--muted);text-align:right}
.preview-stage{background:#111318;border-radius:8px;padding:18px 10px;min-height:330px}.preview-chat{width:min(100%,470px);margin:0 auto}
.preview-effect{box-sizing:border-box;margin:5px auto;white-space:pre-wrap;overflow-wrap:anywhere;text-decoration:none}
.saved-list{min-height:45px}.saved-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #41444b}.saved-name{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.saved-actions{display:flex;gap:5px}
.empty{padding:13px;text-align:center;border:1px dashed #5a5d65;border-radius:7px;color:var(--muted)}.savebar input{flex:1;min-width:150px}
.codebox{width:100%;min-height:250px;background:#101114;color:#dfe1e5;border:1px solid #4b4e56;border-radius:8px;padding:11px;font:12px/1.55 ui-monospace,SFMono-Regular,Consolas,monospace;resize:vertical;word-break:break-all}
.notice{margin-top:10px;padding:9px 10px;border-left:3px solid var(--ui);border-radius:5px;background:#7aa7ff12;color:#d9dbe0;font-size:11px;line-height:1.6}
@media(max-width:1080px){body{padding:11px}.main{grid-template-columns:1fr}.top{display:block}.top-side{margin-top:10px}.quick-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:680px){.effect-grid,.row2,.row3{grid-template-columns:1fr}.quick-grid{grid-template-columns:1fr 1fr}.effect-wide{grid-column:auto}}
</style>
</head>

 <div><h1 id="pageTitle"></h1><div id="pageSubtitle" class="subtitle"></div></div>
 <div class="top-side">

  <div class="section">

  </div>
 </div>
 <div class="panel">
  <div class="section"><h2 data-i="preview"></h2><div class="preview-stage"><div id="previewChat" class="preview-chat"></div></div></div>
  <div class="section">
   <div class="toolbar"><h2 data-i="macro" style="margin:0 auto 0 0"></h2><button id="copyBtn" class="btn primary" data-i="copy"></button><button id="downloadBtn" class="btn" data-i="download"></button></div>
   <textarea id="macroOutput" class="codebox" readonly></textarea><div class="notice" data-i="notice"></div>
  </div>
 </div>
</div>

 success:{fg:'#dfffe8',bg:'#143d23',accent:'#4ecb71',width:'90',align:'left',size:'normal',padding:'regular',bold:true,italic:false,upper:false,spacing:'0',prefix:'✓ ',suffix:''},
 failure:{fg:'#ffe2e4',bg:'#4a181c',accent:'#ef4b54',width:'90',align:'left',size:'normal',padding:'regular',bold:true,italic:false,upper:false,spacing:'0',prefix:'✕ ',suffix:''},
 objective:{fg:'#ffffff',bg:'#27325f',accent:'#7c91ff',width:'90',align:'center',size:'large',padding:'roomy',bold:true,italic:false,upper:true,spacing:'2',prefix:'',suffix:''},
 radio:{fg:'#d3efe6',bg:'#10271f',accent:'#68b99d',width:'85',align:'left',size:'small',padding:'regular',bold:false,italic:false,upper:false,spacing:'1',prefix:'[RADIO] ',suffix:' ▪'},
 broadcast:{fg:'#ffffff',bg:'#70202b',accent:'#ff6676',width:'100',align:'center',size:'normal',padding:'regular',bold:true,italic:false,upper:true,spacing:'1',prefix:'● LIVE　',suffix:''},
 terminal:{fg:'#70ff91',bg:'#06130a',accent:'#2bcf55',width:'90',align:'left',size:'small',padding:'regular',bold:false,italic:false,upper:false,spacing:'1',prefix:'',suffix:' _'},
 encrypted:{fg:'#d4dbff',bg:'#14182e',accent:'#7f8cff',width:'90',align:'left',size:'small',padding:'regular',bold:true,italic:false,upper:true,spacing:'2',prefix:'',suffix:''},
 glitch:{fg:'#ffffff',bg:'#160d18',accent:'#ff2c89',width:'90',align:'center',size:'large',padding:'regular',bold:true,italic:false,upper:true,spacing:'2',prefix:'',suffix:''},
 echo:{fg:'#c6c9d4',bg:'#00000000',accent:'#878b99',width:'75',align:'center',size:'normal',padding:'compact',bold:false,italic:true,upper:false,spacing:'1',prefix:'',suffix:''},
 dream:{fg:'#ece6ff',bg:'#362c5938',accent:'#b69cff',width:'85',align:'center',size:'normal',padding:'roomy',bold:false,italic:true,upper:false,spacing:'1',prefix:'~ ',suffix:' ~'},
 memory:{fg:'#ead8b6',bg:'#493a2438',accent:'#c9a86a',width:'85',align:'left',size:'normal',padding:'roomy',bold:false,italic:true,upper:false,spacing:'0',prefix:'「',suffix:'」'},
 quote:{fg:'#eeeeee',bg:'#242424',accent:'#a8a8a8',width:'80',align:'left',size:'normal',padding:'roomy',bold:false,italic:true,upper:false,spacing:'0',prefix:'“',suffix:'”'},
 chant:{fg:'#f4e7ff',bg:'#24152f',accent:'#c778ff',width:'90',align:'center',size:'large',padding:'roomy',bold:true,italic:false,upper:false,spacing:'2',prefix:'✦ ',suffix:' ✦'},
 countdown:{fg:'#ffffff',bg:'#4a1219',accent:'#ff4a58',width:'65',align:'center',size:'xlarge',padding:'roomy',bold:true,italic:false,upper:true,spacing:'4',prefix:'',suffix:''},
 heartbeat:{fg:'#ffb9bf',bg:'#2b0d10',accent:'#e44350',width:'60',align:'center',size:'large',padding:'regular',bold:true,italic:false,upper:true,spacing:'3',prefix:'♥ ',suffix:' ♥'},
 location:{fg:'#e7e7e7',bg:'#00000000',accent:'#858585',width:'90',align:'center',size:'small',padding:'compact',bold:true,italic:false,upper:true,spacing:'3',prefix:'— ',suffix:' —'},
 time:{fg:'#bfc4cc',bg:'#00000000',accent:'#7b818b',width:'60',align:'center',size:'small',padding:'compact',bold:false,italic:false,upper:true,spacing:'2',prefix:'[ ',suffix:' ]'},
 separator:{fg:'#d5d5d5',bg:'#00000000',accent:'#747474',width:'100',align:'center',size:'small',padding:'regular',bold:true,italic:false,upper:true,spacing:'2',prefix:'',suffix:''},
 redacted:{fg:'#050505',bg:'#050505',accent:'#050505',width:'80',align:'left',size:'normal',padding:'compact',bold:true,italic:false,upper:true,spacing:'1',prefix:'',suffix:''},
 neon:{fg:'#f4f8ff',bg:'#10162b',accent:'#55a7ff',width:'85',align:'center',size:'large',padding:'roomy',bold:true,italic:false,upper:true,spacing:'3',prefix:'',suffix:''},
 spotlight:{fg:'#ffffff',bg:'#221f18',accent:'#f6d56b',width:'80',align:'center',size:'xlarge',padding:'roomy',bold:true,italic:false,upper:true,spacing:'2',prefix:'',suffix:''},
 paper:{fg:'#33291d',bg:'#e7dcc2',accent:'#8b6e45',width:'80',align:'left',size:'normal',padding:'roomy',bold:false,italic:false,upper:false,spacing:'0',prefix:'',suffix:''},
 announcement:{fg:'#ecf6ff',bg:'#23394a',accent:'#79bce8',width:'100',align:'center',size:'normal',padding:'regular',bold:true,italic:false,upper:false,spacing:'1',prefix:'📢 ',suffix:''},
 custom:{fg:'#f2f3f5',bg:'#00000000',accent:'#7aa7ff',width:'90',align:'left',size:'normal',padding:'regular',bold:false,italic:false,upper:false,spacing:'0',prefix:'',suffix:''}
};
function effect(type='narration'){const b=BASE[type]||BASE.custom;return{id:uid(),type,text:tr('default'+type[0].toUpperCase()+type.slice(1)),query:false,repeat:type==='echo'?3:type==='heartbeat'?3:1,opacity:'100',...b}}
let items=[effect('narration'),effect('location')];
function normalize(v){const b=effect(v?.type||'custom');return{...b,...v,id:v?.id||uid()}}
function effectOptions(v){return EFFECTS.map(x=>`<option value="${x}"${v===x?' selected':''}>${esc(tr(x))}</option>`).join('')}
function alignOptions(v){return['left','center','right'].map(x=>`<option value="${x}"${v===x?' selected':''}>${esc(tr(x))}</option>`).join('')}
function sizeOptions(v){return['small','normal','large','xlarge'].map(x=>`<option value="${x}"${v===x?' selected':''}>${esc(tr(x))}</option>`).join('')}
function paddingOptions(v){return['compact','regular','roomy'].map(x=>`<option value="${x}"${v===x?' selected':''}>${esc(tr(x))}</option>`).join('')}
function renderBuilder(){
 const box=$('builder');box.innerHTML='';if(!items.length){box.innerHTML=`<div class="empty">${esc(tr('noItems'))}</div>`;return}
 items.forEach((item,index)=>{const el=document.createElement('div');el.className='effect-item';el.innerHTML=`
 <div class="effect-head"><span class="effect-index">${index+1}. ${esc(tr(item.type))}</span>
  <button class="btn small" data-up>↑</button><button class="btn small" data-down>↓</button><button class="btn small" data-copy>${esc(tr('duplicate'))}</button><button class="btn small danger" data-del>×</button>
 </div>
 <div class="effect-grid">
  <div class="field"><label>${esc(tr('effect'))}</label><select data-type>${effectOptions(item.type)}</select></div>
  <div class="field"><label>${esc(tr('width'))}</label><select data-width>${['40','60','75','90','100'].map(x=>`<option value="${x}"${item.width===x?' selected':''}>${x}%</option>`).join('')}</select></div>
  <div class="field"><label>${esc(tr('align'))}</label><select data-align>${alignOptions(item.align)}</select></div>
  <div class="field effect-wide"><label>${esc(tr('text'))}</label><textarea data-text>${esc(item.text)}</textarea></div>
  <label class="check"><input data-query type="checkbox"${item.query?' checked':''}>${esc(tr('prompt'))}</label>
  <div class="field"><label>${esc(tr('fontSize'))}</label><select data-size>${sizeOptions(item.size)}</select></div>
  <div class="field"><label>${esc(tr('padding'))}</label><select data-padding>${paddingOptions(item.padding)}</select></div>
  <div class="field"><label>${esc(tr('textColor'))}</label><input data-fg type="color" value="${esc(item.fg)}"></div>
  <div class="field"><label>${esc(tr('background'))}</label><input data-bg type="color" value="${item.bg.length===9?item.bg.slice(0,7):esc(item.bg)}"></div>
  <div class="field"><label>${esc(tr('accent'))}</label><input data-accent type="color" value="${esc(item.accent)}"></div>
  <div class="field"><label>${esc(tr('opacity'))}</label><div class="range-line"><input data-opacity type="range" min="20" max="100" step="10" value="${esc(item.opacity)}"><span class="range-value">${esc(item.opacity)}%</span></div></div>
  <div class="field"><label>${esc(tr('letterSpacing'))}</label><select data-spacing>${['0','1','2','3','4','6'].map(x=>`<option value="${x}"${item.spacing===x?' selected':''}>${x}px</option>`).join('')}</select></div>
  <div class="field"><label>${esc(tr('repeat'))}</label><select data-repeat>${[1,2,3,4,5].map(x=>`<option value="${x}"${String(item.repeat)===String(x)?' selected':''}>${x}</option>`).join('')}</select></div>
  <div class="field"><label>${esc(tr('prefix'))}</label><input data-prefix type="text" value="${esc(item.prefix)}"></div>
  <div class="field"><label>${esc(tr('suffix'))}</label><input data-suffix type="text" value="${esc(item.suffix)}"></div>
  <div class="toolbar"><label class="check"><input data-bold type="checkbox"${item.bold?' checked':''}>${esc(tr('bold'))}</label><label class="check"><input data-italic type="checkbox"${item.italic?' checked':''}>${esc(tr('italic'))}</label><label class="check"><input data-upper type="checkbox"${item.upper?' checked':''}>${esc(tr('uppercase'))}</label></div>
 </div>`;
 const bind=(sel,event,fn)=>{const x=el.querySelector(sel);if(x)x.addEventListener(event,e=>{fn(e);update()})};
 bind('[data-type]','change',e=>{const n=effect(e.target.value);items[index]={...n,id:item.id};renderBuilder();update()});
 bind('[data-width]','change',e=>item.width=e.target.value);bind('[data-align]','change',e=>item.align=e.target.value);bind('[data-text]','input',e=>item.text=e.target.value);
 bind('[data-query]','change',e=>item.query=e.target.checked);bind('[data-size]','change',e=>item.size=e.target.value);bind('[data-padding]','change',e=>item.padding=e.target.value);
 bind('[data-fg]','input',e=>item.fg=e.target.value);bind('[data-bg]','input',e=>item.bg=e.target.value);bind('[data-accent]','input',e=>item.accent=e.target.value);
 bind('[data-opacity]','input',e=>{item.opacity=e.target.value;e.target.nextElementSibling.textContent=e.target.value+'%'});
 bind('[data-spacing]','change',e=>item.spacing=e.target.value);bind('[data-repeat]','change',e=>item.repeat=e.target.value);
 bind('[data-prefix]','input',e=>item.prefix=e.target.value);bind('[data-suffix]','input',e=>item.suffix=e.target.value);
 bind('[data-bold]','change',e=>item.bold=e.target.checked);bind('[data-italic]','change',e=>item.italic=e.target.checked);bind('[data-upper]','change',e=>item.upper=e.target.checked);
 el.querySelector('[data-up]').onclick=()=>{if(index){[items[index-1],items[index]]=[items[index],items[index-1]];renderBuilder();update()}};
 el.querySelector('[data-down]').onclick=()=>{if(index<items.length-1){[items[index+1],items[index]]=[items[index],items[index+1]];renderBuilder();update()}};
 el.querySelector('[data-copy]').onclick=()=>{items.splice(index+1,0,normalize({...item,id:uid()}));renderBuilder();update()};
 el.querySelector('[data-del]').onclick=()=>{items.splice(index,1);renderBuilder();update()};box.appendChild(el)})
}
function sizePx(v){return{small:11,normal:13,large:18,xlarge:27}[v]||13}
function padPx(v){return{compact:'4px 8px',regular:'8px 12px',roomy:'13px 16px'}[v]||'8px 12px'}
function opacityHex(v){return Math.max(0,Math.min(255,Math.round((Number(v)||100)*2.55))).toString(16).padStart(2,'0')}
function effectText(item,query=false){let t=query?`?{${tr('promptText')}|${roll(item.text||tr('defaultCustom'))}}`:item.text||'';if(item.upper&&!query)t=t.toUpperCase();return`${item.prefix||''}${t}${item.suffix||''}`}
function effectSpecial(item){
 const s={border:'none',shadow:'none',background:item.bg,decoration:''};
 if(['noticeEffect','warning','success','failure','radio','terminal','encrypted','quote','paper','announcement'].includes(item.type))s.border=`3px solid ${item.accent}`;
 if(item.type==='glitch')s.shadow=`-2px 0 ${item.accent},2px 0 #32d9ff`;
 if(item.type==='neon')s.shadow=`0 0 7px ${item.accent},0 0 14px ${item.accent}`;
 if(item.type==='spotlight')s.shadow=`0 0 10px ${item.accent}`;
 if(item.type==='separator')s.background=`linear-gradient(to bottom,transparent 47%,${item.accent} 47%,${item.accent} 53%,transparent 53%)`;
 if(item.type==='redacted'){s.background='#050505';s.shadow='none'}
 return s
}
function previewLine(item,text,fade=1){
 const el=document.createElement('div'),sp=effectSpecial(item);el.className='preview-effect';el.style.width=item.width+'%';el.style.textAlign=item.align;el.style.fontSize=sizePx(item.size)+'px';el.style.padding=padPx(item.padding);
 el.style.color=item.fg;el.style.background=sp.background;el.style.borderLeft=sp.border;el.style.fontWeight=item.bold?'bold':'normal';el.style.fontStyle=item.italic?'italic':'normal';el.style.letterSpacing=item.spacing+'px';
 el.style.opacity=(Number(item.opacity)/100)*fade;el.style.textShadow=sp.shadow;el.style.textTransform=item.upper?'uppercase':'none';
 if(item.type==='separator'){const span=document.createElement('span');span.style.background='#111318';span.style.padding='0 9px';span.textContent=text;el.appendChild(span)}
 else if(item.type==='redacted')el.textContent='█'.repeat(Math.max(6,Math.min(28,(text||'').length||12)));
 else el.textContent=text;
 return el
}
function renderPreview(){
 const box=$('previewChat');box.innerHTML='';items.forEach(item=>{const count=Math.max(1,+item.repeat||1),base=effectText(item,false);for(let i=0;i<count;i++){const fade=item.type==='echo'?Math.max(.25,1-i*.3):item.type==='heartbeat'?Math.max(.45,1-i*.18):1;box.appendChild(previewLine(item,base,fade))}})
}
function macroStyle(item,fade=1){
 const sp=effectSpecial(item),styles=['display:block','box-sizing:border-box',`width:calc&#40;${item.width}% - 12px&#41;`,`margin:5px auto`,`padding:${padPx(item.padding)}`,`color:${item.fg}`,`background:${sp.background.replace(/\(/g,'&#40;').replace(/\)/g,'&#41;')}`,'font-family:Arial,sans-serif',`font-size:${sizePx(item.size)}px`,`font-weight:${item.bold?'bold':'normal'}`,`font-style:${item.italic?'italic':'normal'}`,`letter-spacing:${item.spacing}px`,`text-align:${item.align}`,`opacity:${((Number(item.opacity)/100)*fade).toFixed(2)}`,'line-height:1.5','white-space:normal','overflow-wrap:anywhere','word-break:break-word','text-decoration:none','cursor:default'];
 if(sp.border!=='none')styles.push(`border-left:${sp.border}`);if(sp.shadow!=='none')styles.push(`text-shadow:${sp.shadow}`);
 if(item.type==='shout'||item.type==='objective'||item.type==='countdown'||item.type==='spotlight')styles.push(`border-top:1px solid ${item.accent}`,`border-bottom:1px solid ${item.accent}`);
 if(['noticeEffect','warning','success','failure','radio','terminal','encrypted','quote','paper','announcement'].includes(item.type))styles.push('border-radius:5px');
 return styles.join(';')+';'
}
function generateMacro(){
 let out='';items.forEach(item=>{const count=Math.max(1,+item.repeat||1),query=item.query,base=effectText(item,query);for(let i=0;i<count;i++){const fade=item.type==='echo'?Math.max(.25,1-i*.3):item.type==='heartbeat'?Math.max(.45,1-i*.18):1;let label=base;if(item.type==='redacted')label=query?'████████████':('█'.repeat(Math.max(6,Math.min(28,(item.text||'').length||12))));out+=link(roll(label),macroStyle(item,fade))}});$('macroOutput').value=out.replace(/\n/g,'')
}
function data(){return{version:1,items:items.map(x=>({...x}))}}
function applyData(d){items=Array.isArray(d?.items)?d.items.map(normalize):[];renderBuilder();update()}
function update(){renderPreview();generateMacro();saveDraft()}
function populateLanguage(){document.documentElement.lang=lang;document.title=tr('title');$('pageTitle').textContent=tr('title');$('pageSubtitle').textContent=tr('subtitle');$('languageLabel').textContent=tr('language');$('languageSelect').options[0].textContent=tr('browser');document.querySelectorAll('[data-i]').forEach(x=>x.textContent=tr(x.dataset.i));$('saveName').placeholder=tr('saveName');$('quickGrid').innerHTML=EFFECTS.map(x=>`<button class="btn small" data-effect="${x}">${esc(tr(x))}</button>`).join('');document.querySelectorAll('[data-effect]').forEach(b=>b.onclick=()=>{items.push(effect(b.dataset.effect));renderBuilder();update()});renderBuilder();renderSaved()}
function saveDraft(){try{localStorage.setItem(DRAFT_KEY,JSON.stringify(data()))}catch(e){}}
function loadDraft(){try{const d=JSON.parse(localStorage.getItem(DRAFT_KEY)||'null');if(d){applyData(d);return true}}catch(e){}return false}
function readLayouts(){try{const v=JSON.parse(localStorage.getItem(LAYOUT_KEY)||'[]');return Array.isArray(v)?v:[]}catch(e){return[]}}
function writeLayouts(v){try{localStorage.setItem(LAYOUT_KEY,JSON.stringify(v))}catch(e){}}
function renderSaved(){const box=$('savedList'),list=readLayouts();box.innerHTML='';if(!list.length){box.innerHTML=`<div class="empty">${esc(tr('none'))}</div>`;return}list.forEach(item=>{const row=document.createElement('div');row.className='saved-item';row.innerHTML=`<span class="saved-name">${esc(item.name||tr('save'))}</span><span class="saved-actions"><button class="btn small" data-load>${esc(tr('load'))}</button><button class="btn small danger" data-del>${esc(tr('delete'))}</button></span>`;row.querySelector('[data-load]').onclick=()=>{applyData(item.data);setStatus('loadedStatus')};row.querySelector('[data-del]').onclick=()=>{writeLayouts(readLayouts().filter(x=>x.id!==item.id));renderSaved();setStatus('deletedStatus')};box.appendChild(row)})}
function saveLayout(){const name=$('saveName').value.trim()||tr('save');const list=readLayouts();list.unshift({id:uid(),name,data:data()});writeLayouts(list.slice(0,100));$('saveName').value='';renderSaved();setStatus('savedStatus')}
function exportData(){const b=new Blob([JSON.stringify({version:1,layouts:readLayouts()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='roll20-simple-chat-effects-data.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);setStatus('exported')}
function importData(file){const r=new FileReader();r.onload=()=>{try{const v=JSON.parse(r.result);if(Array.isArray(v.layouts))writeLayouts(v.layouts);renderSaved();setStatus('imported')}catch(e){setStatus('badJson',true)}};r.readAsText(file)}
async function copyMacro(){try{await navigator.clipboard.writeText($('macroOutput').value)}catch(e){$('macroOutput').select();document.execCommand('copy')}setStatus('copied')}
function downloadMacro(){const b=new Blob([$('macroOutput').value],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='roll20-simple-chat-effects-macro.txt';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
$('languageSelect').value=languageMode;$('languageSelect').onchange=e=>{languageMode=e.target.value;lang=languageMode==='auto'?browserLang():languageMode;try{localStorage.setItem(LANG_KEY,languageMode)}catch(err){}populateLanguage();update()};
$('addBtn').onclick=()=>{items.push(effect('custom'));renderBuilder();update()};$('clearBtn').onclick=()=>{items=[];renderBuilder();update()};
$('saveBtn').onclick=saveLayout;$('copyBtn').onclick=copyMacro;$('downloadBtn').onclick=downloadMacro;$('exportBtn').onclick=exportData;$('importBtn').onclick=()=>$('importFile').click();$('importFile').onchange=e=>{if(e.target.files[0])importData(e.target.files[0]);e.target.value=''};$('resetBtn').onclick=()=>{items=[effect('narration'),effect('location')];renderBuilder();update();setStatus('resetStatus')};
populateLanguage();if(!loadDraft()){items=[effect('narration'),effect('location')];renderBuilder();update()}else update();renderSaved();$('status').textContent=tr('autoSaved');
</script>
</body>
</html>
