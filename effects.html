<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roll20 Simple Chat Effects Generator v9</title>
<style>
:root{
  color-scheme:light;
  --page:#f3f4f6;--panel:#ffffff;--panel2:#f8f9fb;--line:#d4d7dd;
  --text:#202124;--muted:#68707d;--ui:#315b9f;--input:#ffffff
}
html[data-theme="dark"]{
  color-scheme:dark;
  --page:#18191c;--panel:#24262b;--panel2:#2e3035;--line:#45484f;
  --text:#f2f3f5;--muted:#a9adb5;--ui:#7aa7ff;--input:#1d1e21
}
*{box-sizing:border-box}
body{margin:0;padding:18px;background:var(--page);color:var(--text);font:13px/1.5 Arial,"Noto Sans JP","Noto Sans KR",sans-serif}
button,input,select,textarea{font:inherit}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:16px}
.top-side,.toolbar,.savebar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}h1{font-size:21px;margin:0 0 5px}.subtitle,.hint,.status{color:var(--muted)}
.language-control{display:flex;align-items:center;gap:7px;white-space:nowrap}.language-control label{font-size:11px;color:var(--muted)}
.back-link{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;border:1px solid #50535b;border-radius:6px;background:#303238;color:var(--text);padding:6px 9px;text-decoration:none;font-size:12px}.back-link:hover{background:#41444b}
.main{display:grid;grid-template-columns:minmax(530px,1.18fr) minmax(360px,.82fr);gap:16px;align-items:start}.panel{background:var(--panel);border:1px solid #393c42;border-radius:11px;padding:14px}
.section{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:12px}.section:last-child{margin-bottom:0}h2{font-size:14px;margin:0 0 10px}
.field{min-width:0}.field>label{display:block;font-size:11px;color:#d8dbe1;margin-bottom:4px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
input[type=text],select,textarea{width:100%;border:1px solid #50535b;border-radius:6px;background:#1d1e21;color:var(--text);padding:8px 9px;outline:none}
textarea{resize:vertical;min-height:70px;line-height:1.5}input[type=color]{width:100%;height:35px;padding:3px;border:1px solid #50535b;border-radius:6px;background:#1d1e21}input[type=range]{width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--ui)}.check{display:flex;gap:7px;align-items:center;font-size:12px}.check input{margin:0}
.btn{border:1px solid #50535b;border-radius:6px;background:#3b3e45;color:var(--text);padding:7px 10px;cursor:pointer}.btn:hover{background:#484c54}.btn.primary{background:#315b9f;border-color:#4f7fca}.btn.danger{background:#552a2d;border-color:#78363c}.btn.small{padding:4px 7px;font-size:11px}
.quick-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px}.effect-item{border:1px solid #4b4e55;border-radius:8px;background:#282a2f;padding:10px;margin-top:9px}
.effect-head{display:flex;align-items:center;gap:7px;flex-wrap:wrap}.effect-index{font-weight:bold;margin-right:auto}.effect-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:8px}.effect-wide{grid-column:1/-1}
.range-line{display:grid;grid-template-columns:1fr 48px;gap:7px;align-items:center}.range-value{font-size:11px;color:var(--muted);text-align:right}
.preview-stage{background:#111318;border-radius:8px;padding:18px 10px;min-height:330px}.preview-chat{width:min(100%,470px);margin:0 auto}
.preview-effect{box-sizing:border-box;margin:5px auto;white-space:pre-wrap;overflow-wrap:anywhere;text-decoration:none}

.appearance-toggle{
  width:34px;height:34px;display:inline-grid;place-items:center;flex:0 0 auto;
  border:1px solid var(--line);border-radius:7px;background:var(--panel);
  color:var(--text);font-size:17px;line-height:1;cursor:pointer
}
.appearance-toggle:hover{filter:brightness(.96)}
html[data-theme="dark"] .appearance-toggle:hover{filter:brightness(1.12)}

html:not([data-theme="dark"]) .back-link,
html:not([data-theme="dark"]) .btn{
  background:#ffffff;color:#202124;border-color:#cbd0d8
}
html:not([data-theme="dark"]) .btn:hover,
html:not([data-theme="dark"]) .back-link:hover{background:#f1f3f5}
html:not([data-theme="dark"]) .btn.primary{background:#315b9f;color:#ffffff;border-color:#315b9f}
html:not([data-theme="dark"]) .btn.danger{background:#fff3f3;color:#a52a31;border-color:#e0a5aa}
html:not([data-theme="dark"]) input[type=text],
html:not([data-theme="dark"]) select,
html:not([data-theme="dark"]) textarea{
  background:#ffffff;color:#202124;border-color:#cbd0d8
}
html:not([data-theme="dark"]) input[type=color]{background:#ffffff;border-color:#cbd0d8}
html:not([data-theme="dark"]) .effect-item{background:#ffffff;border-color:#d4d7dd}
html:not([data-theme="dark"]) .preview-stage{
  background:#ffffff;border:1px solid #d9dce2
}
html:not([data-theme="dark"]) .codebox{
  background:#ffffff;color:#202124;border-color:#cbd0d8
}
html:not([data-theme="dark"]) .empty{border-color:#c7ccd4}
html:not([data-theme="dark"]) .notice{background:#eef4ff;color:#303744}
html:not([data-theme="dark"]) .preview-effect[data-transparent="true"]{color:#30343a}

.quick-group{grid-column:1/-1;margin-top:5px}.quick-group-title{font-size:11px;font-weight:bold;color:var(--muted);margin:4px 0 6px}
.quick-group-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px}
.preview-image-effect{box-sizing:border-box;margin:6px auto;overflow:hidden;position:relative}
.preview-image-visual{background-position:center;background-repeat:no-repeat;box-sizing:border-box}
.preview-image-caption{box-sizing:border-box;white-space:pre-wrap;overflow-wrap:anywhere}
.preview-side-row,.preview-pair-row,.preview-avatar-row{display:flex;align-items:stretch;box-sizing:border-box;margin:6px auto;overflow:hidden}
.preview-avatar-row{align-items:center;overflow:visible}
.preview-polaroid{box-sizing:border-box;margin:7px auto;padding:8px;background:#f2eee5;color:#24211d;box-shadow:0 6px 15px #00000066}
@media(max-width:680px){.quick-group-grid{grid-template-columns:1fr 1fr}}

.saved-list{min-height:45px}.saved-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #41444b}.saved-name{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.saved-actions{display:flex;gap:5px}
.empty{padding:13px;text-align:center;border:1px dashed #5a5d65;border-radius:7px;color:var(--muted)}.savebar input{flex:1;min-width:150px}
.codebox{width:100%;min-height:250px;background:#101114;color:#dfe1e5;border:1px solid #4b4e56;border-radius:8px;padding:11px;font:12px/1.55 ui-monospace,SFMono-Regular,Consolas,monospace;resize:vertical;word-break:break-all}
.notice{margin-top:10px;padding:9px 10px;border-left:3px solid var(--ui);border-radius:5px;background:#7aa7ff12;color:#d9dbe0;font-size:11px;line-height:1.6}
@media(max-width:1080px){body{padding:11px}.main{grid-template-columns:1fr}.top{display:block}.top-side{margin-top:10px}.quick-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:680px){.effect-grid,.row2,.row3{grid-template-columns:1fr}.quick-grid{grid-template-columns:1fr 1fr}.effect-wide{grid-column:auto}}

/* Unified light/dark UI surfaces */
:root{
 --ui-surface:#ffffff;
 --ui-surface-soft:#f7f8fa;
 --ui-input:#ffffff;
 --ui-button:#ffffff;
 --ui-button-hover:#eef1f4;
 --ui-label:#303640;
 --ui-preview:#ffffff;
 --ui-code:#ffffff;
 --ui-code-text:#202124;
 --ui-notice:#eef4ff;
 --ui-danger-bg:#fff3f3;
 --ui-danger-text:#a52a31;
 --ui-shadow:0 10px 28px rgba(30,41,59,.10)
}
html[data-theme="dark"]{
 --ui-surface:#24262b;
 --ui-surface-soft:#2e3035;
 --ui-input:#1d1e21;
 --ui-button:#35383f;
 --ui-button-hover:#454951;
 --ui-label:#e0e3e8;
 --ui-preview:#111318;
 --ui-code:#101114;
 --ui-code-text:#dfe1e5;
 --ui-notice:#242b36;
 --ui-danger-bg:#552a2d;
 --ui-danger-text:#ffd9dc;
 --ui-shadow:0 12px 30px rgba(0,0,0,.28)
}
.panel{background:var(--ui-surface)!important;border-color:var(--line)!important;box-shadow:var(--ui-shadow)!important}
.section,.build-row,.cell,.effect-item,.message-head,.saved-list{
 background:var(--ui-surface-soft)!important;border-color:var(--line)!important
}
input[type=text],input[type=url],input[type=number],select,textarea{
 background:var(--ui-input)!important;color:var(--text)!important;border-color:var(--line)!important
}
input[type=color]{background:var(--ui-input)!important;border-color:var(--line)!important}
.field>label,.check,.language-control label{color:var(--ui-label)!important}
.btn:not(.primary):not(.danger),.back-link,.appearance-toggle{
 background:var(--ui-button)!important;color:var(--text)!important;border-color:var(--line)!important
}
.btn:not(.primary):not(.danger):hover,.back-link:hover,.appearance-toggle:hover{
 background:var(--ui-button-hover)!important
}
.btn.danger{background:var(--ui-danger-bg)!important;color:var(--ui-danger-text)!important;border-color:var(--line)!important}
.preview-stage{background:var(--ui-preview)!important;border:1px solid var(--line)!important}
.codebox{background:var(--ui-code)!important;color:var(--ui-code-text)!important;border-color:var(--line)!important}
.notice{background:var(--ui-notice)!important;color:var(--text)!important}
.empty{border-color:var(--line)!important;color:var(--muted)!important}
.macro-preview-host{
 display:block!important;width:100%!important;max-width:none!important;min-height:0!important;
 margin:0!important;padding:0!important;border:0!important;background:transparent!important;
 border-radius:0!important;box-shadow:none!important;overflow:visible!important;
 font-size:0!important;line-height:0!important
}
.macro-preview-host>a{pointer-events:none!important}

.btn.primary{background:var(--ui)!important;color:#fff!important;border-color:var(--ui)!important}

.preview-stage{overflow-x:auto!important}
.macro-preview-host{min-width:max-content!important}

</style>
</head>
<body>
<div class="top">
 <div><h1 id="pageTitle"></h1><div id="pageSubtitle" class="subtitle"></div></div>
 <div class="top-side"><button id="appearanceToggle" class="appearance-toggle" type="button" aria-label="Theme">☾</button>
  <a class="back-link" href="./index.html"><span aria-hidden="true">←</span><span data-i="back"></span></a>
  <div class="language-control"><label id="languageLabel" for="languageSelect"></label><select id="languageSelect"><option value="auto"></option><option value="ja">日本語</option><option value="ko">한국어</option><option value="en">English</option></select></div>
  <div id="status" class="status"></div>
 </div>
</div>
<div class="main">
 <div class="panel">
  <div class="section">
   <h2 data-i="quick"></h2>
   <div class="field" style="max-width:280px;margin-bottom:10px">
    <label data-i="imageCanvasWidth"></label>
    <select id="imageCanvasWidth">
     <option value="320" data-i="canvas320"></option>
     <option value="400" data-i="canvas400"></option>
     <option value="480" data-i="canvas480"></option>
     <option value="520" data-i="canvas520" selected></option>
     <option value="600" data-i="canvas600"></option>
    </select>
   </div>
   <div id="quickGrid" class="quick-grid"></div>
  </div>
  <div class="section">
   <div class="toolbar"><h2 data-i="builder" style="margin:0 auto 0 0"></h2><button id="addBtn" class="btn small" data-i="add"></button><button id="clearBtn" class="btn small danger" data-i="clear"></button></div>
   <div id="builder"></div>
  </div>
  <div class="section">
   <h2 data-i="save"></h2>
   <div class="savebar"><input id="saveName" type="text"><button id="saveBtn" class="btn primary" data-i="saveLayout"></button></div>
   <div id="savedList" class="saved-list" style="margin-top:10px"></div>
   <div class="toolbar" style="margin-top:10px"><button id="exportBtn" class="btn small" data-i="export"></button><button id="importBtn" class="btn small" data-i="import"></button><input id="importFile" type="file" accept="application/json" hidden><button id="resetBtn" class="btn small danger" data-i="reset"></button></div>
  </div>
 </div>
 <div class="panel">
  <div class="section"><h2 data-i="preview"></h2><div class="preview-stage"><div id="previewChat" class="preview-chat"></div></div></div>
  <div class="section">
   <div class="toolbar"><h2 data-i="macro" style="margin:0 auto 0 0"></h2><button id="copyBtn" class="btn primary" data-i="copy"></button><button id="downloadBtn" class="btn" data-i="download"></button></div>
   <textarea id="macroOutput" class="codebox" readonly></textarea>
   <div class="notice">
    <strong data-i="compatibility"></strong>
    <div id="compatStatus" style="margin-top:4px"></div>
    <div data-i="runtimeUrlHint" style="margin-top:5px"></div>
   </div>
   <div class="notice" data-i="notice"></div><div class="notice" data-i="lightSafeNote"></div><div class="notice" data-i="imageWidthFix"></div><div class="notice" data-i="imageCaptionFix"></div><div class="notice" data-i="fixedCanvasNotice"></div><div class="notice" data-i="safeImageLayoutNotice"></div><div class="notice" data-i="overlayRemovedNotice"></div><div class="notice" data-i="overlayMigrationNotice"></div>
  </div>
 </div>
</div>

 if(['noticeEffect','warning','success','failure','radio','terminal','encrypted','quote','paper','announcement'].includes(item.type)){
  styles.push('border-radius:5px')
 }
 return styles.join(';')+';'
}
function cssUrl(v){return String(v||'').trim().replace(/"/g,'%22').replace(/\(/g,'%28').replace(/\)/g,'%29')}
function macroImageUrl(item,second=false){if(second&&item.imageQuery2)return`?{${tr('imagePromptLabel2')}|https://example.com/image2.png}`;if(!second&&item.imageQuery)return`?{${tr('imagePromptLabel')}|https://example.com/image.png}`;return cssUrl(second?item.url2:item.url)}
function macroOverlay(item){
 const c=roll20Color(overlayColor(item));
 return c&&c!=='transparent'?`linear-gradient(${c},${c}),`:''
}
function macroImageBackground(item,url,cctv=false){
 const scan=cctv?'repeating-linear-gradient(to bottom,rgba(255,255,255,0.045) 0,rgba(255,255,255,0.045) 1px,transparent 1px,transparent 4px),':'';
 return`${scan}${macroOverlay(item)}url(${url})`
}
function fixedCanvasWidth(){
 return Math.max(240,Math.min(720,Number($('imageCanvasWidth').value)||520))
}
function fixedImageWidth(item){
 const ratio=Math.max(20,Math.min(100,Number(item.width)||90))/100;
 return Math.max(120,Math.round(fixedCanvasWidth()*ratio))
}
function macroFrameShadow(item){
 if(item.frame==='accent')return`inset 0 0 0 2px ${item.accent}`;
 if(item.frame==='muted')return'inset 0 0 0 2px #747b88';
 if(item.frame==='white')return'inset 0 0 0 7px #f2eee5';
 return''
}
function imageSafeMargin(top=6,bottom=0){
 return`${top}px auto ${bottom}px auto`
}
function imageCaptionIndent(item,amount=10){
 if(item.align==='left')return`text-indent:${amount}px`;
 if(item.align==='right')return`text-indent:-${amount}px`;
 return'text-indent:0'
}
function fixedImageBlock(item,url,width,height,options={}){
 const shadowParts=[macroFrameShadow(item),...(options.shadows||[])].filter(Boolean);
 const styles=[
  'display:block!important',
  'box-sizing:border-box!important',
  `width:${width}px!important`,
  `min-width:${width}px!important`,
  `max-width:${width}px!important`,
  `height:${height}px!important`,
  `margin:${options.margin||imageSafeMargin(6,0)}!important`,
  'padding:0!important',
  'border:0!important','outline:0!important',
  'float:none!important',
  `background-color:${roll20Color(options.background||item.bg)}`,
  url?`background-image:${macroImageBackground(item,url,item.type==='imageCctv')}`:'',
  `background-size:${options.fit||(item.fit==='stretch'?'100% 100%':item.fit)}`,
  `background-position:${item.focusX}% ${item.focusY}%`,
  'background-repeat:no-repeat',
  `border-radius:${options.radius||radiusValue(item)}`,
  shadowParts.length?`box-shadow:${shadowParts.join(',')}`:'',
  `opacity:${(Number(item.opacity)/100).toFixed(2)}`,
  'overflow:hidden!important',
  'color:transparent!important',
  'font-size:0!important','line-height:0!important',
  'text-decoration:none!important','cursor:default'
 ].filter(Boolean);
 return link('　',styles.join(';')+';')
}
function fixedCaptionBlock(item,text,width,options={}){
 const font=sizePx(item.size),line=Math.max(16,Math.round(font*1.5));
 const background=options.background===undefined?item.bg:options.background;
 const color=options.color||item.fg;
 const styles=[
  'display:block!important',
  'box-sizing:border-box!important',
  `width:${width}px!important`,
  `min-width:${width}px!important`,
  `max-width:${width}px!important`,
  `margin:${options.margin||'0 auto 6px auto'}!important`,
  'padding:7px 0!important',
  'border:0!important','outline:0!important',
  'float:none!important',
  `background-color:${roll20Color(background)}`,
  `color:${roll20Color(color)}`,
  'font-family:Arial,sans-serif',
  `font-size:${font}px`,
  `font-weight:${item.bold?'bold':'normal'}`,
  `font-style:${item.italic?'italic':'normal'}`,
  `letter-spacing:${item.spacing}px`,
  `line-height:${line}px`,
  `text-align:${options.align||item.align}`,
  imageCaptionIndent({...item,align:options.align||item.align},10),
  'white-space:normal','overflow-wrap:anywhere','word-break:break-word',
  'overflow:hidden!important',
  options.shadow||'',
  'text-decoration:none!important','cursor:default'
 ].filter(Boolean);
 return link(text||'　',styles.join(';')+';')
}
function imageMacro(item){
 const width=fixedImageWidth(item);
 const url=macroImageUrl(item),url2=macroImageUrl(item,true);
 const captionRaw=effectText(item,item.query);
 const caption=item.query?captionRaw:roll(captionRaw);
 const height=Math.max(20,Number(item.height)||150);
 let output='';

 if(item.type==='imagePair'){
  output+=fixedImageBlock(item,url,width,height,{margin:imageSafeMargin(6,3)});
  output+=fixedImageBlock(item,url2,width,height,{margin:imageSafeMargin(3,0)});
  if(item.captionPos!=='none'&&caption){
   output+=fixedCaptionBlock(item,caption,width,{align:'center'})
  }
  return output
 }

 if(item.type==='imageLeft'){
  output+=fixedImageBlock(item,url,width,height);
  if(caption)output+=fixedCaptionBlock(item,caption,width,{align:'left'});
  return output
 }

 if(item.type==='imageRight'){
  output+=fixedImageBlock(item,url,width,height);
  if(caption)output+=fixedCaptionBlock(item,caption,width,{align:'right'});
  return output
 }

 if(item.type==='imageAvatar'){
  const side=Math.min(height,width);
  output+=fixedImageBlock(item,url,side,side,{
   margin:imageSafeMargin(6,0),
   radius:'999px'
  });
  if(caption)output+=fixedCaptionBlock(item,caption,width,{align:'center'});
  return output
 }

 if(item.type==='imagePolaroid'){
  output+=fixedImageBlock(item,url,width,height,{
   margin:imageSafeMargin(7,0),
   radius:'0',
   shadows:['inset 0 0 0 8px #f2eee5']
  });
  if(item.captionPos!=='none'&&caption){
   output+=fixedCaptionBlock(item,caption,width,{
    background:'#f2eee5',color:'#24211d',align:'center'
   })
  }
  return output
 }

 output+=fixedImageBlock(item,url,width,height);

 if(item.captionPos!=='none'&&caption){
  let align=item.align;
  let background=item.bg;
  let color=item.fg;
  let shadow='';

  if(item.type==='imageBanner'||item.type==='imageCaption'||item.type==='imageSilhouette'){
   align='center'
  }
  if(item.type==='imageCaption'){
   background=item.bg;
   color=item.fg;
   shadow=`box-shadow:inset 0 3px 0 ${item.accent}`
  }
  if(item.type==='imageCctv'){
   align='left'
  }

  output+=fixedCaptionBlock(item,caption,width,{align,background,color,shadow})
 }
 return output
}
function auditMacroOutput(value){
 const issues=[],styles=[...String(value||'').matchAll(/style="([^"]*)"/g)].map(m=>m[1]);
 for(const style of styles){
  if(/[()]/.test(style)){issues.push('compatRawParen');break}
 }
 if(/#[0-9a-fA-F]{8}(?![0-9a-fA-F])/.test(value))issues.push('compatHex8');
 const box=$('compatStatus');
 if(!issues.length){
  box.textContent=tr('compatPassed');box.style.color='#87d89b'
 }else{
  box.textContent=tr('compatFailed')+' — '+issues.map(tr).join(' ');box.style.color='#ffb6b8'
 }
 return issues
}
function generateMacro(){
 let out='';
 items.forEach(item=>{
  if(isImageEffect(item.type)){out+=imageMacro(item);return}
  const count=Math.max(1,+item.repeat||1),query=item.query,raw=effectText(item,query),base=query?raw:roll(raw);
  for(let i=0;i<count;i++){
   const fade=item.type==='echo'?Math.max(.25,1-i*.3):item.type==='heartbeat'?Math.max(.45,1-i*.18):1;
   let label=base;
   if(item.type==='redacted')label=query?'████████████':('█'.repeat(Math.max(6,Math.min(28,(item.text||'').length||12))));
   out+=link(label,macroStyle(item,fade))
  }
 });
 $('macroOutput').value=out.replace(/\n/g,'');
 auditMacroOutput($('macroOutput').value)
}
function data(){return{version:9,imageCanvasWidth:$('imageCanvasWidth').value,items:items.map(x=>({...x}))}}
function applyData(d){
 $('imageCanvasWidth').value=String(d?.imageCanvasWidth||'520');
 items=Array.isArray(d?.items)?d.items.map(normalize):[];
 renderBuilder();update()
}
function update(){generateMacro();renderPreview();saveDraft()}
function populateLanguage(){document.documentElement.lang=lang;document.title=tr('title');$('pageTitle').textContent=tr('title');$('pageSubtitle').textContent=tr('subtitle');$('languageLabel').textContent=tr('language');$('languageSelect').options[0].textContent=tr('browser');document.querySelectorAll('[data-i]').forEach(x=>x.textContent=tr(x.dataset.i));$('saveName').placeholder=tr('saveName');$('quickGrid').innerHTML=`<div class="quick-group"><div class="quick-group-title">${esc(tr('textEffects'))}</div><div class="quick-group-grid">${TEXT_EFFECTS.map(x=>`<button class="btn small" data-effect="${x}">${esc(tr(x))}</button>`).join('')}</div></div><div class="quick-group"><div class="quick-group-title">${esc(tr('imageEffects'))}</div><div class="quick-group-grid">${IMAGE_EFFECTS.map(x=>`<button class="btn small" data-effect="${x}">${esc(tr(x))}</button>`).join('')}</div></div>`;document.querySelectorAll('[data-effect]').forEach(b=>b.onclick=()=>{items.push(effect(b.dataset.effect));renderBuilder();update()});renderBuilder();renderSaved()}
function saveDraft(){try{localStorage.setItem(DRAFT_KEY,JSON.stringify(data()))}catch(e){}}
function loadDraft(){try{const d=JSON.parse(localStorage.getItem(DRAFT_KEY)||'null');if(d){applyData(d);return true}}catch(e){}return false}
function readLayouts(){try{const v=JSON.parse(localStorage.getItem(LAYOUT_KEY)||'[]');return Array.isArray(v)?v:[]}catch(e){return[]}}
function writeLayouts(v){try{localStorage.setItem(LAYOUT_KEY,JSON.stringify(v))}catch(e){}}
function renderSaved(){const box=$('savedList'),list=readLayouts();box.innerHTML='';if(!list.length){box.innerHTML=`<div class="empty">${esc(tr('none'))}</div>`;return}list.forEach(item=>{const row=document.createElement('div');row.className='saved-item';row.innerHTML=`<span class="saved-name">${esc(item.name||tr('save'))}</span><span class="saved-actions"><button class="btn small" data-load>${esc(tr('load'))}</button><button class="btn small danger" data-del>${esc(tr('delete'))}</button></span>`;row.querySelector('[data-load]').onclick=()=>{applyData(item.data);setStatus('loadedStatus')};row.querySelector('[data-del]').onclick=()=>{writeLayouts(readLayouts().filter(x=>x.id!==item.id));renderSaved();setStatus('deletedStatus')};box.appendChild(row)})}
function saveLayout(){const name=$('saveName').value.trim()||tr('save');const list=readLayouts();list.unshift({id:uid(),name,data:data()});writeLayouts(list.slice(0,100));$('saveName').value='';renderSaved();setStatus('savedStatus')}
function exportData(){const b=new Blob([JSON.stringify({version:9,layouts:readLayouts()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='roll20-simple-chat-effects-v9-data.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);setStatus('exported')}
function importData(file){const r=new FileReader();r.onload=()=>{try{const v=JSON.parse(r.result);if(Array.isArray(v.layouts))writeLayouts(v.layouts);renderSaved();setStatus('imported')}catch(e){setStatus('badJson',true)}};r.readAsText(file)}
async function copyMacro(){try{await navigator.clipboard.writeText($('macroOutput').value)}catch(e){$('macroOutput').select();document.execCommand('copy')}setStatus('copied')}
function downloadMacro(){const b=new Blob([$('macroOutput').value],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='roll20-simple-chat-effects-macro.txt';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
$('languageSelect').value=languageMode;$('languageSelect').onchange=e=>{languageMode=e.target.value;lang=languageMode==='auto'?browserLang():languageMode;try{localStorage.setItem(LANG_KEY,languageMode)}catch(err){}populateLanguage();update()};
$('imageCanvasWidth').addEventListener('change',update);
$('addBtn').onclick=()=>{items.push(effect('custom'));renderBuilder();update()};$('clearBtn').onclick=()=>{items=[];renderBuilder();update()};
$('saveBtn').onclick=saveLayout;$('copyBtn').onclick=copyMacro;$('downloadBtn').onclick=downloadMacro;$('exportBtn').onclick=exportData;$('importBtn').onclick=()=>$('importFile').click();$('importFile').onchange=e=>{if(e.target.files[0])importData(e.target.files[0]);e.target.value=''};$('resetBtn').onclick=()=>{items=[effect('narration'),effect('location')];renderBuilder();update();setStatus('resetStatus')};
populateLanguage();if(!loadDraft()){items=[effect('narration'),effect('location')];renderBuilder();update()}else update();renderSaved();$('status').textContent=tr('autoSaved');

const APPEARANCE_KEY='r20MacroAppearanceV1';
function readAppearance(){
  try{
    const value=localStorage.getItem(APPEARANCE_KEY);
    return value==='dark'?'dark':'light';
  }catch(e){return'light'}
}
let appearanceMode=readAppearance();
function applyAppearance(){
  document.documentElement.dataset.theme=appearanceMode;
  const button=document.getElementById('appearanceToggle');
  if(button){
    const dark=appearanceMode==='dark';
    button.textContent=dark?'☀':'☾';
    const label=typeof tr==='function'
      ?tr(dark?'switchLight':'switchDark')
      :(dark?'Switch to light mode':'Switch to dark mode');
    button.title=label;
    button.setAttribute('aria-label',label);
  }
}
function toggleAppearance(){
  appearanceMode=appearanceMode==='dark'?'light':'dark';
  try{localStorage.setItem(APPEARANCE_KEY,appearanceMode)}catch(e){}
  applyAppearance();
}
document.getElementById('appearanceToggle')?.addEventListener('click',toggleAppearance);
applyAppearance();
