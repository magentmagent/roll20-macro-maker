<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roll20 Cinematic Card Assembler v5</title>
<style>
:root{
  color-scheme:light;
  --page:#f3f4f6;--panel:#ffffff;--panel2:#f8f9fb;--line:#d4d7dd;
  --text:#202124;--muted:#68707d;--ui:#9b7429
}
html[data-theme="dark"]{
  color-scheme:dark;
  --page:#18191c;--panel:#24262b;--panel2:#2e3035;--line:#45484f;
  --text:#f2f3f5;--muted:#a9adb5;--ui:#d6b46a
}
*{box-sizing:border-box}
body{margin:0;padding:18px;background:var(--page);color:var(--text);font:13px/1.5 Arial,"Noto Sans JP","Noto Sans KR",sans-serif}
button,input,select,textarea{font:inherit}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:16px}.top-side,.toolbar,.savebar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
h1{font-size:21px;margin:0 0 5px}.subtitle,.hint,.status{color:var(--muted)}.language-control{display:flex;align-items:center;gap:7px;white-space:nowrap}.language-control label{font-size:11px;color:var(--muted)}
.main{display:grid;grid-template-columns:minmax(520px,1.18fr) minmax(360px,.82fr);gap:16px;align-items:start}.panel{background:var(--panel);border:1px solid #393c42;border-radius:11px;padding:14px}
.section{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:12px}.section:last-child{margin-bottom:0}h2{font-size:14px;margin:0 0 10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.field{min-width:0}.field>label{display:block;font-size:11px;color:#d8dbe1;margin-bottom:4px}
input[type=text],input[type=url],input[type=number],select,textarea{width:100%;border:1px solid #50535b;border-radius:6px;background:#1d1e21;color:var(--text);padding:8px 9px;outline:none}
textarea{resize:vertical;min-height:66px;line-height:1.5}input[type=color]{width:100%;height:36px;padding:3px;border:1px solid #50535b;border-radius:6px;background:#1d1e21}
input[type=range]{width:100%}input:focus,select:focus,textarea:focus{border-color:var(--ui)}.check{display:flex;gap:7px;align-items:center;font-size:12px}.check input{margin:0}
.btn{border:1px solid #50535b;border-radius:6px;background:#3b3e45;color:var(--text);padding:7px 10px;cursor:pointer}.btn:hover{background:#484c54}.btn.primary{background:#705d2e;border-color:#9a7d36}.btn.danger{background:#552a2d;border-color:#78363c}.btn.small{padding:4px 7px;font-size:11px}


.appearance-toggle{
  width:34px;height:34px;display:inline-grid;place-items:center;flex:0 0 auto;
  border:1px solid var(--line);border-radius:7px;background:var(--panel);
  color:var(--text);font-size:17px;line-height:1;cursor:pointer
}
.appearance-toggle:hover{filter:brightness(.96)}
html[data-theme="dark"] .appearance-toggle:hover{filter:brightness(1.12)}


html:not([data-theme="dark"]) input[type=text],
html:not([data-theme="dark"]) input[type=url],
html:not([data-theme="dark"]) input[type=number],
html:not([data-theme="dark"]) select,
html:not([data-theme="dark"]) textarea,
html:not([data-theme="dark"]) input[type=color]{background:#ffffff;color:#202124;border-color:#cbd0d8}
html:not([data-theme="dark"]) .btn{background:#ffffff;color:#202124;border-color:#cbd0d8}
html:not([data-theme="dark"]) .btn.primary{background:#705d2e;color:#ffffff;border-color:#705d2e}
html:not([data-theme="dark"]) .btn.danger{background:#fff3f3;color:#a52a31;border-color:#e0a5aa}
html:not([data-theme="dark"]) .builder-row,
html:not([data-theme="dark"]) .cell{background:#ffffff;border-color:#d4d7dd}
html:not([data-theme="dark"]) .preview-stage{background:#ffffff;border:1px solid #d9dce2}
html:not([data-theme="dark"]) .codebox{background:#ffffff;color:#202124;border-color:#cbd0d8}

.back-link{
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
  border:1px solid #50535b;border-radius:6px;background:#303238;
  color:var(--text);padding:6px 9px;text-decoration:none;font-size:12px
}
.back-link:hover{background:#41444b;text-decoration:none}

.preset-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.savebar input{flex:1;min-width:150px}
.builder-row{border:1px solid #4b4e55;border-radius:8px;background:#282a2f;padding:10px;margin-top:9px}.builder-head{display:flex;align-items:center;gap:7px;flex-wrap:wrap}.builder-title{font-weight:bold;margin-right:auto}
.cells{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:9px}.cell{border:1px solid #4a4d54;border-radius:7px;background:#303238;padding:9px}.cell-head{display:grid;grid-template-columns:1fr 90px auto;gap:6px;align-items:center}.cell-fields{margin-top:8px}.range-line{display:grid;grid-template-columns:1fr 46px;gap:7px;align-items:center}.range-value{font-size:11px;color:var(--muted);text-align:right}
.preview-stage{background:#111318;border-radius:8px;padding:22px 12px;min-height:320px}.preview-card{width:min(100%,460px);margin:0 auto;border-radius:9px;overflow:hidden;box-shadow:0 16px 38px rgba(0,0,0,.35)}
.preview-accent{height:5px}.preview-line{display:flex;align-items:stretch;gap:4px}.preview-cell{min-width:0;background:transparent;overflow:hidden}.preview-text{padding:8px 13px;white-space:pre-wrap;overflow-wrap:anywhere}
.preview-label{font-size:10px;font-weight:bold;letter-spacing:.16em}.preview-title{font-size:24px;font-weight:800;line-height:1.18}.preview-subtitle{font-size:13px;line-height:1.45}.preview-body{font-size:13px;line-height:1.6}
.preview-list{margin:0;padding:8px 13px 8px 30px}.preview-list li{margin:4px 0}.preview-meta{padding:8px 13px;font-size:10px;letter-spacing:.08em}.preview-image{background-repeat:no-repeat}.preview-divider{display:flex;align-items:center;padding:0 13px}.preview-divider span{display:block;width:100%}

.preview-quote{font-style:italic}
.preview-callout{margin:5px 7px;border-radius:6px}
.preview-badge-wrap{display:flex;align-items:center;padding:7px 10px}
.preview-badge-pill{display:inline-block;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:bold;letter-spacing:.05em}
.preview-progress{padding:8px 12px}
.preview-progress-head{display:flex;justify-content:space-between;gap:8px;font-size:11px;margin-bottom:6px}
.preview-progress-track{height:10px;border-radius:999px;background:#00000045;overflow:hidden}
.preview-progress-fill{height:100%;border-radius:999px}
.preview-stat{display:flex;flex-direction:column;justify-content:center;padding:8px 12px}
.preview-stat-value{font-size:31px;font-weight:800;line-height:1.05}
.preview-stat-label{font-size:10px;letter-spacing:.09em;margin-top:4px}

.saved-list{min-height:45px}.saved-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #41444b}.saved-name{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.saved-actions{display:flex;gap:5px}
.empty{padding:13px;text-align:center;border:1px dashed #5a5d65;border-radius:7px;color:var(--muted)}.codebox{width:100%;min-height:250px;background:#101114;color:#dfe1e5;border:1px solid #4b4e56;border-radius:8px;padding:11px;font:12px/1.55 ui-monospace,SFMono-Regular,Consolas,monospace;resize:vertical;word-break:break-all}
.notice{margin-top:10px;padding:9px 10px;border-left:3px solid var(--ui);border-radius:5px;background:rgba(214,180,106,.08);color:#d9dbe0;font-size:11px;line-height:1.6}
@media(max-width:1050px){body{padding:11px}.main{grid-template-columns:1fr}.cells{grid-template-columns:1fr}.top{display:block}.top-side{margin-top:10px}.row2,.row3{grid-template-columns:1fr}.preset-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="top">
  <div><h1 id="pageTitle"></h1><div id="pageSubtitle" class="subtitle"></div></div>
  <div class="top-side"><button id="appearanceToggle" class="appearance-toggle" type="button" aria-label="Theme">☾</button><a class="back-link" href="./index.html"><span aria-hidden="true">←</span><span data-i="back"></span></a>
    <div class="language-control"><label id="languageLabel" for="languageSelect"></label><select id="languageSelect"><option value="auto"></option><option value="ja">日本語</option><option value="ko">한국어</option><option value="en">English</option></select></div>
    <div id="status" class="status"></div>
  </div>
</div>
<div class="main">
  <div class="panel">
    <div class="section">
      <h2 data-i="settings"></h2>
      <div class="row3">
        <div class="field"><label data-i="theme"></label><select id="theme"><option value="cinema">CINEMA</option><option value="system">SYSTEM</option><option value="danger">DANGER</option><option value="fantasy">FANTASY</option><option value="noir">NOIR</option><option value="archive">ARCHIVE</option></select></div>
        <div class="field"><label data-i="cardWidth"></label><select id="cardWidth"><option value="70">70%</option><option value="80">80%</option><option value="90" selected>90%</option><option value="100">100%</option></select></div>
        <div class="field"><label data-i="rowGap"></label><select id="rowGap"><option value="0">0px</option><option value="2" selected>2px</option><option value="4">4px</option><option value="8">8px</option></select></div>
      </div>
      <div class="row3" style="margin-top:9px">
        <div class="field"><label data-i="accent"></label><input id="accent" type="color" value="#d6b46a"></div>
        <div class="field"><label data-i="background"></label><input id="background" type="color" value="#202227"></div>
        <div class="field"><label data-i="textColor"></label><input id="textColor" type="color" value="#f5f2ea"></div>
      </div>
      <div class="field" style="margin-top:9px"><label data-i="mutedColor"></label><input id="mutedColor" type="color" value="#a9a49a"></div>
    </div>

    <div class="section">
      <h2 data-i="effects"></h2>
      <div class="row3">
        <div class="field"><label data-i="backgroundEffect"></label><select id="backgroundEffect">
          <option value="solid" data-i="solid"></option><option value="gradient" data-i="gradient"></option>
          <option value="vignette" data-i="vignette"></option><option value="scanlines" data-i="scanlines"></option>
        </select></div>
        <div class="field"><label data-i="secondaryBackground"></label><input id="background2" type="color" value="#111318"></div>
        <div class="field"><label data-i="accentEdge"></label><select id="accentEdge">
          <option value="top" data-i="topEdge"></option><option value="left" data-i="leftEdge"></option>
          <option value="both" data-i="bothEdges"></option><option value="none" data-i="noEdge"></option>
        </select></div>
      </div>
      <div class="row3" style="margin-top:9px">
        <div class="field"><label data-i="borderStyle"></label><select id="borderStyle">
          <option value="none" data-i="borderNone"></option><option value="solid" data-i="borderSolid"></option>
          <option value="double" data-i="borderDouble"></option><option value="dashed" data-i="borderDashed"></option>
        </select></div>
        <div class="field"><label data-i="borderWidth"></label><select id="borderWidth">
          <option value="1">1px</option><option value="2" selected>2px</option><option value="3">3px</option><option value="4">4px</option>
        </select></div>
        <div class="field"><label data-i="borderColor"></label><input id="borderColor" type="color" value="#d6b46a"></div>
      </div>
      <div class="row3" style="margin-top:9px">
        <div class="field"><label data-i="cardRadius"></label><select id="cardRadius">
          <option value="0">0px</option><option value="6">6px</option><option value="10" selected>10px</option>
          <option value="16">16px</option><option value="24">24px</option>
        </select></div>
        <div class="field"><label data-i="shadowEffect"></label><select id="shadowEffect">
          <option value="none" data-i="shadowNone"></option><option value="soft" data-i="shadowSoft"></option>
          <option value="hard" data-i="shadowHard"></option><option value="glow" data-i="shadowGlow"></option>
        </select></div>
        <div class="field"><label data-i="titleEffect"></label><select id="titleEffect">
          <option value="none" data-i="textNone"></option><option value="shadow" data-i="textShadow"></option>
          <option value="glow" data-i="textGlow"></option><option value="outline" data-i="textOutline"></option>
        </select></div>
      </div>
      <div class="hint" data-i="effectHint" style="margin-top:9px"></div>
    </div>

    <div class="section">
      <h2 data-i="presets"></h2>
      <div class="preset-grid" id="presetGrid"></div>
    </div>

    <div class="section">
      <div class="toolbar"><h2 data-i="builder" style="margin:0 auto 0 0"></h2><button id="addRowBtn" class="btn small" data-i="addRow"></button></div>
      <div id="builder"></div>
      <div class="hint" data-i="cropHint" style="margin-top:9px"></div>
      <div class="hint" data-i="directUrl" style="margin-top:5px"></div>
    </div>

    <div class="section">
      <h2 data-i="save"></h2>
      <div class="savebar"><input id="saveName" type="text"><button id="saveBtn" class="btn primary" data-i="saveLayout"></button></div>
      <div id="savedList" class="saved-list" style="margin-top:10px"></div>
      <div class="toolbar" style="margin-top:10px"><button id="exportBtn" class="btn small" data-i="export"></button><button id="importBtn" class="btn small" data-i="import"></button><input id="importFile" type="file" accept="application/json" hidden><button id="resetBtn" class="btn small danger" data-i="reset"></button></div>
    </div>
  </div>

  <div class="panel">
    <div class="section"><h2 data-i="preview"></h2><div class="preview-stage"><div id="previewCard" class="preview-card"></div></div></div>
    <div class="section">
      <div class="toolbar"><h2 data-i="macro" style="margin:0 auto 0 0"></h2><button id="copyBtn" class="btn primary" data-i="copy"></button><button id="downloadBtn" class="btn" data-i="download"></button></div>
      <textarea id="macroOutput" class="codebox" readonly></textarea><div class="notice" data-i="roll20Notice"></div>
    </div>
  </div>
</div>

function browserLang(){for(const v of(navigator.languages||[navigator.language||''])){const c=String(v).toLowerCase().split('-')[0];if(['ja','ko','en'].includes(c))return c}return'ja'}
function savedMode(){try{const v=localStorage.getItem(LANG_KEY);return['auto','ja','ko','en'].includes(v)?v:'auto'}catch(e){return'auto'}}
let languageMode=savedMode(),lang=languageMode==='auto'?browserLang():languageMode;
const tr=k=>COPY[lang][k]??k;
function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2)}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function roll(v){return String(v??'').replace(/&/g,'&amp;').replace(/\[/g,'&#91;').replace(/\]/g,'&#93;').replace(/\(/g,'&#40;').replace(/\)/g,'&#41;').replace(/"/g,'&quot;').replace(/\|/g,'&#124;').replace(/\{/g,'&#123;').replace(/\}/g,'&#125;').replace(/\r?\n/g,' ')}
function cssUrl(v){return String(v??'').trim().replace(/"/g,'%22').replace(/\(/g,'%28').replace(/\)/g,'%29')}
function link(label,style){return`[${label}](#" style="${style}")`}
function safeColor(v,f){return/^#[0-9a-f]{6}$/i.test(String(v||''))?v:f}

 $('borderStyle').value=d.borderStyle||'none';$('borderWidth').value=String(d.borderWidth||'2');$('borderColor').value=safeColor(d.borderColor,d.accent||'#d6b46a');
 $('cardRadius').value=String(d.cardRadius||'10');$('shadowEffect').value=d.shadowEffect||'none';$('titleEffect').value=d.titleEffect||'none';
 rows=normalizeRows(d.rows);renderBuilder();update()
}
function promptLabel(c,ri,ci){const base=tr(c.type==='image'?'imagePrompt':'enterText');if(lang==='ja')return`${ri+1}行 ${ci+1}列 ${base}`;if(lang==='en')return`Row ${ri+1}, Column ${ci+1}: ${base}`;return`${ri+1}행 ${ci+1}열 ${base}`}
function contentText(c,ri,ci){return c.query?`?{${promptLabel(c,ri,ci)}|${roll(c.text||tr('enterText'))}}`:roll(c.text)}
function outputCell(c,ri,ci,rowHeight,effWidth,first,gapShare,leftMargin){
 const base=['display:inline-block','position:relative','z-index:2','box-sizing:border-box','vertical-align:top',`width:calc&#40;${effWidth}% - ${gapShare}px&#41;`,`height:${rowHeight}px`,first?`margin:0 0 0 ${leftMargin}%`:`margin:0 0 0 ${$('rowGap').value}px`,'padding:0','background:transparent','text-decoration:none','cursor:default','overflow:hidden'];
 if(c.type==='image'){
  const url=c.imageQuery?`?{${promptLabel(c,ri,ci)}|https://example.com/image.png}`:cssUrl(c.url),overlay=overlayColor(c);
  let image='';if(url){image=overlay?`linear-gradient&#40;${overlay},${overlay}&#41;,url&#40;${url}&#41;`:`url&#40;${url}&#41;`}
  return link('　',[...base,image?`background-image:${image}`:'',`background-color:${$('mutedColor').value}`,`background-size:${fitSize(c)}`,`background-position:${c.focusX}% ${c.focusY}%`,'background-repeat:no-repeat',`border:${imageFrame(c)}`,`border-radius:${c.radius}px`,'color:transparent','font-size:0','line-height:0'].filter(Boolean).join(';')+';')
 }
 if(c.type==='divider')return link('　',[...base,`background:linear-gradient&#40;to bottom,transparent 0,transparent calc&#40;50% - ${c.thickness/2}px&#41;,${$('accent').value} calc&#40;50% - ${c.thickness/2}px&#41;,${$('accent').value} calc&#40;50% + ${c.thickness/2}px&#41;,transparent calc&#40;50% + ${c.thickness/2}px&#41;,transparent 100%&#41;`,'color:transparent','font-size:0','line-height:0'].join(';')+';')
 if(c.type==='spacer')return link('　',[...base,'color:transparent','font-size:0','line-height:0'].join(';')+';')
 if(c.type==='quote'){const q=contentText(c,ri,ci),source=c.source?`　${roll(c.source)}`:'';return link(`“${q}”${source}`,[...base,'padding:10px 14px',`color:${$('textColor').value}`,'font-family:Arial,sans-serif','font-size:13px','font-style:italic','line-height:20px',`text-align:${c.align}`,`border-left:3px solid ${$('accent').value}`,'white-space:normal','overflow-wrap:anywhere'].join(';')+';')}
 if(c.type==='callout'){return link(contentText(c,ri,ci)||'　',[...base,'padding:10px 12px',`background:#00000033`,`border-left:4px solid ${calloutColor(c.callout)}`,`color:${$('textColor').value}`,'font-family:Arial,sans-serif','font-size:13px','line-height:20px','text-align:left','white-space:normal','overflow-wrap:anywhere'].join(';')+';')}
 if(c.type==='badge'){const a=$('accent').value;let styles=[];if(c.badge==='filled')styles=[`background:${a}`,`color:${$('background').value}`];if(c.badge==='outline')styles=['background:transparent',`border:1px solid ${a}`,`color:${a}`];if(c.badge==='soft')styles=[`background:${withAlpha(a,20)}`,`color:${a}`];return link(roll(c.text)||'　',[...base,'height:38px','padding:8px 11px',...styles,'border-radius:999px','font-family:Arial,sans-serif','font-size:11px','font-weight:bold','line-height:20px',`text-align:${c.align}`,'letter-spacing:.5px'].join(';')+';')}
 if(c.type==='progress'){const v=Math.max(0,Math.min(100,+c.value||0)),label=`${roll(c.text)}${c.showValue?`　${v}%`:''}`;return link(label,[...base,'height:46px','padding:13px 12px',`background:linear-gradient&#40;to right,${$('accent').value} 0%,${$('accent').value} ${v}%,#00000033 ${v}%,#00000033 100%&#41;`,`color:${$('textColor').value}`,'border-radius:6px','font-family:Arial,sans-serif','font-size:11px','font-weight:bold','line-height:20px','text-align:center','letter-spacing:.4px'].join(';')+';')}
 if(c.type==='stat'){const label=[roll(c.statValue),roll(c.statLabel)].filter(Boolean).join('　');return link(label||'　',[...base,'padding:13px 12px',`color:${$('textColor').value}`,'font-family:Arial,sans-serif','font-size:24px','font-weight:bold','line-height:30px',`text-align:${c.align}`,`text-shadow:${textEffectCss()}`,'white-space:normal','overflow-wrap:anywhere'].join(';')+';')}
 const value=c.type==='list'?c.text.split(/\r?\n/).map(x=>x.trim()).filter(Boolean).map((x,i)=>`${c.number?(i+1)+'.':'•'} ${x}`).join('　'):contentText(c,ri,ci);
 let size=13,weight='normal',color=$('textColor').value,line=20,pad='8px 12px',extra=[];
 if(c.type==='label'){size=10;weight='bold';color=$('accent').value;line=16;pad='8px 12px'}
 if(c.type==='title'){size=22;weight='bold';line=28;pad='8px 12px';extra.push(`text-shadow:${textEffectCss()}`)}
 if(c.type==='subtitle'){size=12;color=$('mutedColor').value;line=18}
 if(c.type==='meta'){size=10;color=$('mutedColor').value;line=16}
 return link(value||'　',[...base,`padding:${pad}`,`color:${color}`,'font-family:Arial,sans-serif',`font-size:${size}px`,`font-weight:${weight}`,`line-height:${line}px`,`text-align:${c.align}`,...extra,'white-space:normal','overflow-wrap:anywhere','word-break:break-word'].join(';')+';')
}
function generateMacro(){
 const cardWidth=+$('cardWidth').value||90,left=(100-cardWidth)/2,bg=$('background').value,gap=+$('rowGap').value||0,edge=$('accentEdge').value;
 const packed=[];rows.forEach((r,ri)=>packRow(r).forEach(line=>packed.push({line,ri,height:Math.max(...line.map(estimateHeight),12)})));
 const topHeight=(edge==='top'||edge==='both')?5:0,totalHeight=topHeight+packed.reduce((s,x)=>s+x.height,0)+10,border=$('borderStyle').value;
 let outer=['display:block','position:relative','z-index:0','box-sizing:border-box',`width:${cardWidth}%`,`height:${totalHeight}px`,`margin:0 0 -${totalHeight}px ${left}%`,'padding:0',`background-color:${bg}`,`border-radius:${$('cardRadius').value}px`,`box-shadow:${cardShadowCss()}`,'color:transparent','font-size:0','line-height:0','text-decoration:none','cursor:default','overflow:hidden'];
 const bgImage=macroBackground();if(bgImage)outer.push(`background-image:${bgImage}`);if(border!=='none')outer.push(`border:${$('borderWidth').value}px ${border} ${$('borderColor').value}`);if(edge==='left'||edge==='both')outer.push(`border-left:5px solid ${$('accent').value}`);
 let out=link('　',outer.join(';')+';');
 if(topHeight)out+=link('　',['display:block','position:relative','z-index:2','box-sizing:border-box',`width:${cardWidth}%`,`height:${topHeight}px`,`margin:0 0 0 ${left}%`,'padding:0',`background:${$('accent').value}`,'color:transparent','font-size:0','line-height:0','text-decoration:none','cursor:default'].join(';')+';');
 packed.forEach(item=>{const normalized=normalizeLine(item.line),totalGap=gap*Math.max(0,item.line.length-1),gapShare=item.line.length?totalGap/item.line.length:0;normalized.forEach((entry,ci)=>{const eff=cardWidth*entry.width/100;out+=outputCell(entry.cell,item.ri,ci,item.height,eff,ci===0,gapShare,left)})});
 out+=link('　',['display:block','position:relative','z-index:2','box-sizing:border-box',`width:${cardWidth}%`,'height:10px',`margin:0 0 0 ${left}%`,'padding:0','background:transparent','color:transparent','font-size:0','line-height:0','text-decoration:none','cursor:default'].join(';')+';');
 $('macroOutput').value=out.replace(/\n/g,'')
}
function update(){renderPreview();generateMacro();saveDraft()}
function applyTheme(name){const t=THEMES[name]||THEMES.cinema;$('accent').value=t.a;$('background').value=t.b;$('background2').value=t.b2;$('borderColor').value=t.a;$('textColor').value=t.t;$('mutedColor').value=t.m}
function populateLanguage(){document.documentElement.lang=lang;document.title=tr('title');$('pageTitle').textContent=tr('title');$('pageSubtitle').textContent=tr('subtitle');$('languageLabel').textContent=tr('language');$('languageSelect').options[0].textContent=tr('browser');document.querySelectorAll('[data-i]').forEach(x=>x.textContent=tr(x.dataset.i));$('saveName').placeholder=tr('saveName');$('presetGrid').innerHTML=['scene','system','npc','evidence','item','recap','ending','blank'].map(x=>`<button class="btn" data-preset="${x}">${esc(tr(x))}</button>`).join('');document.querySelectorAll('[data-preset]').forEach(b=>b.onclick=()=>{rows=preset(b.dataset.preset);renderBuilder();update()});renderBuilder();renderSaved()}
function saveDraft(){try{localStorage.setItem(DRAFT_KEY,JSON.stringify(data()))}catch(e){}}
function loadDraft(){try{const d=JSON.parse(localStorage.getItem(DRAFT_KEY)||'null');if(d){applyData(d);return true}}catch(e){}return false}
function readLayouts(){try{const v=JSON.parse(localStorage.getItem(LAYOUT_KEY)||'[]');return Array.isArray(v)?v:[]}catch(e){return[]}}
function writeLayouts(v){try{localStorage.setItem(LAYOUT_KEY,JSON.stringify(v))}catch(e){}}
function renderSaved(){const box=$('savedList'),list=readLayouts();box.innerHTML='';if(!list.length){box.innerHTML=`<div class="empty">${esc(tr('none'))}</div>`;return}list.forEach(item=>{const r=document.createElement('div');r.className='saved-item';r.innerHTML=`<span class="saved-name">${esc(item.name||tr('save'))}</span><span class="saved-actions"><button class="btn small" data-load>${esc(tr('load'))}</button><button class="btn small danger" data-del>${esc(tr('delete'))}</button></span>`;r.querySelector('[data-load]').onclick=()=>{applyData(item.data);setStatus('loadedStatus')};r.querySelector('[data-del]').onclick=()=>{writeLayouts(readLayouts().filter(x=>x.id!==item.id));renderSaved();setStatus('deletedStatus')};box.appendChild(r)})}
function saveLayout(){const name=$('saveName').value.trim()||tr('save');const list=readLayouts();list.unshift({id:uid(),name,data:data()});writeLayouts(list.slice(0,100));$('saveName').value='';renderSaved();setStatus('savedStatus')}
function exportData(){const b=new Blob([JSON.stringify({version:5,layouts:readLayouts()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='roll20-cinematic-assembler-v5-data.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);setStatus('exported')}
function importData(file){const r=new FileReader();r.onload=()=>{try{const v=JSON.parse(r.result);if(Array.isArray(v.layouts))writeLayouts(v.layouts);renderSaved();setStatus('imported')}catch(e){setStatus('badJson',true)}};r.readAsText(file)}
async function copyMacro(){try{await navigator.clipboard.writeText($('macroOutput').value)}catch(e){$('macroOutput').select();document.execCommand('copy')}setStatus('copied')}
function downloadMacro(){const b=new Blob([$('macroOutput').value],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='roll20-cinematic-assembler-macro.txt';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
$('languageSelect').value=languageMode;$('languageSelect').onchange=e=>{languageMode=e.target.value;lang=languageMode==='auto'?browserLang():languageMode;try{localStorage.setItem(LANG_KEY,languageMode)}catch(err){}populateLanguage();update()};
$('theme').onchange=e=>{applyTheme(e.target.value);update()};['cardWidth','rowGap','accent','background','background2','textColor','mutedColor','backgroundEffect','accentEdge','borderStyle','borderWidth','borderColor','cardRadius','shadowEffect','titleEffect'].forEach(id=>{$(id).addEventListener('input',update);$(id).addEventListener('change',update)});
$('addRowBtn').onclick=()=>{rows.push(row([cell('body','100')]));renderBuilder();update()};$('saveBtn').onclick=saveLayout;$('copyBtn').onclick=copyMacro;$('downloadBtn').onclick=downloadMacro;$('exportBtn').onclick=exportData;$('importBtn').onclick=()=>$('importFile').click();$('importFile').onchange=e=>{if(e.target.files[0])importData(e.target.files[0]);e.target.value=''};$('resetBtn').onclick=()=>{rows=preset('scene');applyTheme('cinema');renderBuilder();update();setStatus('resetStatus')};
populateLanguage();if(!loadDraft()){applyTheme('cinema');rows=preset('scene');renderBuilder();update()}else update();renderSaved();$('status').textContent=tr('autoSaved');

const APPEARANCE_KEY='r20MacroAppearanceV1';
function readAppearance(){
  try{
    const value=localStorage.getItem(APPEARANCE_KEY);
    return value==='dark'?'dark':'light';
  }catch(e){return'light'}
}
let appearanceMode=readAppearance();
function applyAppearance(){
  document.documentElement.dataset.theme=appearanceMode;
  const button=document.getElementById('appearanceToggle');
  if(button){
    const dark=appearanceMode==='dark';
    button.textContent=dark?'☀':'☾';
    const label=typeof tr==='function'
      ?tr(dark?'switchLight':'switchDark')
      :(dark?'Switch to light mode':'Switch to dark mode');
    button.title=label;
    button.setAttribute('aria-label',label);
  }
}
function toggleAppearance(){
  appearanceMode=appearanceMode==='dark'?'light':'dark';
  try{localStorage.setItem(APPEARANCE_KEY,appearanceMode)}catch(e){}
  applyAppearance();
}
document.getElementById('appearanceToggle')?.addEventListener('click',toggleAppearance);
applyAppearance();
